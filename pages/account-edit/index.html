<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <meta name="theme-color" content="#2900E0" />
    <meta name="apple-mobile-web-app-status-bar" content="#2900e0" />

    <link rel="icon" type="image/png" href="/icons/icon144.png" />
    <link rel="apple-touch-icon" href="/icons/icon192.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Редактирование данных пользователя</title>
  </head>
  <body style="position: relative">
    <div class="twpx-b24a-page-content twpx-b24a-page--profile">
      <div class="twpx-b24a-bg">
        <img
          src="/images/background-blur.png"
          alt=""
          class="twpx-b24a-bg-blur"
        />
        <picture>
          <source
            srcset="/images/background-mobile.png"
            media="(max-width: 767px)"
          />
          <img src="" data-src="/images/background.png" alt="" />
        </picture>
      </div>

      <div class="twpx-b24a-titlebar">
        <div class="twpx-b24a-titlebar-left">
          <a href="/pages/auth/" class="twpx-b24a-back" title="Назад"
            ><span>Назад</span></a
          >
          <a href="/" class="twpx-b24a-to-main" title="Вернуться на главную">
            <img src="/images/accounts-logo.svg" alt="" />
          </a>
        </div>
        <div class="twpx-b24a-titlebar-right">
          <a href="/pages/auth/" class="twpx-b24a-exit">Выйти</a>
        </div>
      </div>

      <label
        for="PERSONAL_PHOTO"
        class="twpx-b24a-avatar twpx-b24a-avatar--editable"
      >
        <img src="/images/icon-profile.svg" alt="" />
        <div class="twpx-b24a-avatar-edit"></div>
      </label>

      <div class="twpx-b24a-content twpx-b24a-gap-32">
        <div class="twpx-b24a-h1">Редактирование профиля</div>
        <div class="twpx-b24a-content-pad">
          <div class="twpx-b24a-form">
            <form action="">
              <div class="twpx-b24a-gap-32">

                <div class="twpx-b24a-gap-16">
                  <div class="twpx-b24a-form-hidden">
                    <input id="PERSONAL_PHOTO" type="file" name="PHOTO" />
                    <input
                      id="PERSONAL_PHOTO_del"
                      type="checkbox"
                      name="PERSONAL_PHOTO_del"
                      value="Y"
                    />
                  </div>

                  <div class="twpx-input twpx-text-input" data-iconspath="/images/icons/">
                      <input name="LASTNAME" type="text" value="" required>
                      <label>Фамилия</label>
                  </div>

                  <div class="twpx-input twpx-text-input" data-iconspath="/images/icons/">
                      <input name="NAME" type="text" value="Петр" required>
                      <label>Имя</label>
                  </div>

                  <div class="twpx-input twpx-text-input" data-iconspath="/images/icons/">
                      <input name="PATRONIMIC" type="text" value="Матвеевич-Иванопольский" required>
                      <label>Отчество</label>
                  </div>

                  <div class="twpx-input twpx-text-input" data-iconspath="/images/icons/">
                      <input name="AREA" type="text" value="40" required>
                      <label>Участок</label>
                  </div>

                  <div class="twpx-input twpx-tel-input" data-iconspath="/images/icons/">
                      <input name="TEL" type="tel" value="" required>
                      <label>Телефон</label>
                  </div>

                  <div class="twpx-input twpx-email-input" data-iconspath="/images/icons/">
                      <input name="EMAIL" type="email" value="" required>
                      <label>Email</label>
                  </div>
                </div>

                <div class="twpx-b24a-submit">
                  <a href="/pages/account-profile/"
                    class="twpx-b24a-btn twpx-b24a-btn--gray twpx-b24a-btn--lg"
                  >
                    Отменить
                  </a>
                  <div class="twpx-b24a-submit-button">
                    <input
                      type="submit"
                      name="save"
                      value="Сохранить"
                      class="twpx-b24a-btn twpx-b24a-btn--default twpx-b24a-btn--lg"
                    />
                  </div>
                </div>

              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="/pwa.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/form.ts"></script>
  </body>
</html>
