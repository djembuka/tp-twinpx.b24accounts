<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tp-twinpx.b24accounts</title>
  </head>
  <body>
    <div id="app">
      <form id="testForm">

        <div class="twpx-form">

          <div class="twpx-b24a-h1 twpx-form-heading">Вход в личный кабинет</div>

          <div class="twpx-form-controls">
            <div class="twpx-input twpx-email-input" data-iconspath="images/">
                <input name="EMAIL" type="email" value="">
                <label>Email</label>
            </div>
            <div class="twpx-input twpx-password-input" data-iconspath="images/">
                <input name="PASSWORD" type="password" value="">
                <label>Пароль</label>
            </div>
          </div>

          <div class="twpx-form-buttons">
            <input
              type="submit"
              name="enter"
              value="Войти"
              class="twpx-b24a-btn twpx-b24a-btn--default twpx-b24a-btn--lg"
            />
          </div>

          <div class="twpx-form-links">
            <a href="/forgot/">Забыли пароль?</a>
          </div>
          
        </div>

      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
